<!DOCTYPE html>
<html>
<head>
<title>Change Password</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:linear-gradient(135deg,#e0e7ff,#f5f3ff);
  min-height:100vh;
  padding:30px;
}

/* Profile Button */
.top-right{
  position:absolute;
  top:25px;
  right:30px;
}

.profile-btn{
background:#6a5acd;
color:white;
padding:5px 12px;   /* smaller buttons */
border-radius:18px;
text-decoration:none;
font-size:13px;
font-weight:500;
display:flex;
align-items:center;
gap:5px;
transition:0.3s;
}

/* Profile hover blue */

.profile-btn:hover{
background:#3b82f6;
transform:translateY(-2px);
}


/* Card */
.container{
  display:flex;
  justify-content:center;
  margin-top:80px;
}

.card{
  width:450px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(10px);
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  transition:0.4s;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 20px 50px rgba(106,90,205,0.25);
}

/* Heading */
h2{
  text-align:center;
  color:#4b2aad;
  margin-bottom:20px;
}

/* Inputs */
input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

input:focus{
  border-color:#6a5acd;
}

/* Button */
.btn{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:25px;
  background:#6a5acd;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<div class="top-right">
  <a href="{% url 'profile' %}" class="profile-btn">👤 Profile</a>
</div>

<div class="container">
  <div class="card">

    <h2>🔒 Change Password</h2>

    <form method="POST">
      {% csrf_token %}
      <input type="password" name="old_password" placeholder="Old Password" required>
      <input type="password" name="new_password1" placeholder="New Password" required>
      <input type="password" name="new_password2" placeholder="Confirm Password" required>

      <button type="submit" class="btn">🔑 Update Password</button>
    </form>

  </div>
</div>

</body>
</html>

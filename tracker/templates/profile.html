<!DOCTYPE html>
<html>
<head>
<title>Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

/* Background */
body{
  background:linear-gradient(135deg,#e0e7ff,#f5f3ff);
  min-height:100vh;
  padding:30px;
}

/* Dashboard Button */
.top-right{
  position:absolute;
  top:25px;
  right:30px;
}

.dashboard-btn{
background:#6a5acd;
color:white;
text-decoration:none;
padding:6px 12px;
border-radius:16px;
font-size:13px;
font-weight:500;
display:flex;
align-items:center;
gap:5px;
transition:0.3s;
}

/* Hover */

.dashboard-btn:hover{
background:#3b82f6;
transform:translateY(-2px);
box-shadow:0 4px 10px rgba(0,0,0,0.15);
}


/* Container */
.container{
  display:flex;
  justify-content:center;
  align-items:center;
  margin-top:80px;
}

/* Split Card */
.card{
  display:flex;
  width:750px;
  border-radius:20px;
  overflow:hidden;
  backdrop-filter:blur(10px);
  background:rgba(255,255,255,0.7);
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  transition:all 0.4s ease;
}

/* 🔥 HOVER EFFECT */
.card:hover{
  transform:translateY(-8px) scale(1.01);
  box-shadow:0 20px 50px rgba(106,90,205,0.25);
  border:1px solid rgba(106,90,205,0.2);
}

.card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 20px;
  padding: 1px;
  background: linear-gradient(120deg, #6a5acd, #a78bfa, #6a5acd);

  /* Standard mask (VS Code wants this) */
  mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);

  /* WebKit mask (for Chrome/Safari) */
  -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);

  -webkit-mask-composite: xor;
  mask-composite: exclude;

  opacity: 0;
  transition: 0.4s;
}

.card:hover::before{
  opacity:1;
}

/* LEFT SIDE (INFO) */
.left{
  width:50%;
  padding:30px;
  border-right:1px solid #eee;
}

.left h2{
  color:#4b2aad;
  margin-bottom:20px;
  text-align:center;
}

.info{
  margin:15px 0;
}

.label{
  display:block;
  font-size:13px;
  color:#777;
}

.value{
  font-size:15px;
  color:#4b2aad;
  font-weight:500;
}

/* Status */
.active{
  color:green;
  font-weight:600;
}

/* RIGHT SIDE (ACTIONS) */
.right{
  width:50%;
  padding:30px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.right h3{
  text-align:center;
  margin-bottom:20px;
  color:#4b2aad;
}

/* Buttons */
.actions{
  display:flex;
  flex-direction:column;
  gap:15px;
}

.btn{
  text-decoration:none;
  padding:12px;
  border-radius:25px;
  text-align:center;
  color:white;
  font-size:14px;
  transition:0.3s;
  position:relative;
  overflow:hidden;
}

.edit{ background:#3b82f6; }
.password{ background:#6a5acd; }
.logout{ background:#ef4444; }

/* Hover + Glow */
.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

/* Shine effect */
.btn::after{
  content:'';
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:-100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.4),transparent);
  transition:0.5s;
}

.btn:hover::after{
  left:100%;
}

</style>
</head>

<body>

<!-- Dashboard Button -->
<div class="top-right">
  <a href="{% url 'dashboard' %}" class="dashboard-btn">
    <i class="fa-solid fa-house"></i> Dashboard
</a>
  </a>
</div>

<div class="container">

  <div class="card">

    <!-- LEFT -->
    <div class="left">
      <h2>👤 Profile</h2>

      <div class="info">
        <span class="label">Username</span>
        <span class="value">{{ user.username }}</span>
      </div>

      <div class="info">
        <span class="label">Email</span>
        <span class="value">{{ user.email }}</span>
      </div>

      <div class="info">
        <span class="label">Joined</span>
        <span class="value">{{ user.date_joined|date:"d M Y" }}</span>
      </div>

      <div class="info">
        <span class="label">Status</span>
        {% if user.is_active %}
          <span class="active">● Active</span>
        {% else %}
          <span>Inactive</span>
        {% endif %}
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
      <h3>⚙️ Actions</h3>

      <div class="actions">
        <a href="{% url 'edit_profile' %}" class="btn edit">
          ✏️ Edit Profile
        </a>

        <a href="{% url 'change_password' %}" class="btn password">
          🔒 Change Password
        </a>

        <a href="{% url 'logout' %}" class="btn logout">
          🚪 Logout
        </a>
      </div>
    </div>

  </div>

</div>

</body>
</html>

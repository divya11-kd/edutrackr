<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#2575fc,#6a11cb);
}

.container{
background:white;
padding:40px;
border-radius:15px;
width:350px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:5px;
}

p{
color:gray;
font-size:14px;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

.remember{
display:flex;
align-items:center;
gap:5px;
font-size:14px;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
border:none;
background:#2575fc;
color:white;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1a5de0;
}

</style>

</head>

<body>

<div class="container">

<h2>Welcome Back to EduTrackr</h2>
<p>Access your trackers effortlessly!!</p>

{% if messages %}
    {% for message in messages %}
        <div class="error-msg">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<form method="POST">
{% csrf_token %}

<input type="text" name="username" placeholder="Username or Email" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Login</button>
<p style="margin-top:15px; text-align:center;">
    New to EduTrackr?
    <a href="{% url 'register' %}" style="color:#007bff; font-weight:600;">Register</a>
</p>

</form>

</div>

</body>
</html>
